version: '3'

services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/redis-demo
      - REDIS_URL=redis://redis:6379
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - redis
      - mongo

  redis:
    image: redis:alpine
    restart: always
    ports:
      - "6379:6379"

  mongo:
    image: mongo:latest
    restart: always
    ports: 
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data: